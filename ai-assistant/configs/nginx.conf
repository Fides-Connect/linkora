# HTTP - keep port 80 active (proxy)
server {
    listen 80 default_server;
    server_name _;

    # Proxy requests (including WebSocket upgrade) to the app running on 127.0.0.1:8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}

# HTTPS - existing TLS server block
server {
    listen 443 ssl http2;
    server_name _; # replace with your domain when using Let's Encrypt

    ssl_certificate /etc/ssl/ai-assistant/localhost.pem;
    ssl_certificate_key /etc/ssl/ai-assistant/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}
