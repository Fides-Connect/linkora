[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src/ai_assistant
    --cov-report=term-missing
    --cov-report=xml
markers =
    unit: Unit tests that mock external dependencies
    integration: Integration tests that may require external services
    slow: Tests that take a long time to run

filterwarnings =
    ignore:Inheritance class AiohttpClientSession from ClientSession is discouraged:DeprecationWarning
    # Suppress false positive from pytest-cov instrumentation with Mock and aiohttp.ClientResponse
    # The warning occurs during coverage analysis when Mock auto-generates coroutine stubs
    ignore:coroutine 'ClientResponse.json' was never awaited:RuntimeWarning
    # Suppress DeprecationWarning from google/genai/types.py for deprecated _UnionGenericAlias (Python 3.14+)
    ignore:.*'_UnionGenericAlias' is deprecated.*:DeprecationWarning
    # Suppress UserWarning from langchain_core/_api/deprecation.py for Pydantic V1 incompatibility (Python 3.14+)
    ignore:.*Core Pydantic V1 functionality isn't compatible with Python 3.14 or greater.*:UserWarning
