version: '3.8'

services:
  ai-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-assistant
    ports:
      - "8080:8080"
    volumes:
      # Mount Application Default Credentials for local development.
      # Run `gcloud auth application-default login` first.
      # On Linux/macOS (default below):
      #   export GOOGLE_APPLICATION_CREDENTIALS=${HOME}/.config/gcloud/application_default_credentials.json
      # On Windows (PowerShell), ADC is typically at:
      #   $env:GOOGLE_APPLICATION_CREDENTIALS="$env:APPDATA\gcloud\application_default_credentials.json"
      - ${GOOGLE_APPLICATION_CREDENTIALS:-${HOME}/.config/gcloud/application_default_credentials.json}:/app/application_default_credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/application_default_credentials.json
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - LANGUAGE_CODE_DE=${LANGUAGE_CODE_DE:-de-DE}
      - VOICE_NAME_DE=${VOICE_NAME_DE:-de-DE-Chirp3-HD-Sulafat}
      - LANGUAGE_CODE_EN=${LANGUAGE_CODE_EN:-en-US}
      - VOICE_NAME_EN=${VOICE_NAME_EN:-en-US-Chirp3-HD-Sulafat}
      - HOST=0.0.0.0
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOOGLE_TTS_API_CONCURRENCY=${GOOGLE_TTS_API_CONCURRENCY:-5}
      - WEAVIATE_URL=${WEAVIATE_URL:-http://weaviate:8080}
    restart: unless-stopped
    networks:
      - default
      - weaviate-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  weaviate-network:
    name: weaviate-network
    external: true
