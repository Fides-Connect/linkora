apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-assistant.fullname" . }}
  labels:
    {{- include "ai-assistant.labels" . | nindent 4 }}
type: Opaque
data:
  gcp-sa-key: {{ .Values.secrets.gcpServiceAccount | b64enc }}
  gemini-api-key: {{ .Values.secrets.geminiApiKey | b64enc }}
  google-oauth-client-id: {{ .Values.secrets.googleOauthClientId | b64enc }}
  admin-secret-key: {{ .Values.secrets.adminSecretKey | b64enc }}
