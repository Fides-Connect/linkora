apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: Helm
type: Opaque
data:
  google-application-credentials: {{ .Values.secrets.googleApplicationCredentialsJson | b64enc }}
  gemini-api-key: {{ .Values.secrets.geminiApiKey | b64enc }}
  google-oauth-client-id: {{ .Values.secrets.googleOauthClientId | b64enc }}
  admin-secret-key: {{ .Values.secrets.adminSecretKey | b64enc }}
