apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Chart.Name }}
  template:
    metadata:
      annotations:
        # Force pod restart on config/secret changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Chart.Name }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.env.port }}
          protocol: TCP
        env:
        - name: GOOGLE_SERVICE_ACCOUNT_JSON_PATH
          value: {{ .Values.env.googleApplicationCredentials }}
        - name: GEMINI_API_KEY
          value: {{ .Values.secrets.geminiApiKey | quote }}
        - name: GOOGLE_OAUTH_CLIENT_ID
          value: {{ .Values.secrets.googleOauthClientId | quote }}
        - name: USE_WEAVIATE
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: use-weaviate
        - name: WEAVIATE_URL
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: weaviate-url
        - name: LANGUAGE_CODE
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: language-code
        - name: VOICE_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: voice-name
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: host
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: port
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: log-level
        - name: GOOGLE_TTS_API_CONCURRENCY
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: google-tts-api-concurrency
        - name: DEBUG_RECORD_AUDIO
          valueFrom:
            configMapKeyRef:
              name: {{ .Chart.Name }}
              key: debug-record-audio
        - name: ADMIN_SECRET_KEY
          value: {{ .Values.secrets.adminSecretKey | quote }}
        volumeMounts:
        - name: google-application-credentials
          mountPath: /app/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: google-application-credentials
        secret:
          secretName: {{ .Chart.Name }}
          items:
          - key: google-application-credentials.json
            path: google-application-credentials.json
