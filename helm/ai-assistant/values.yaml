# Default values for ai-assistant
replicaCount: 1

image:
  # Image repository; set at deploy time via --set image.repository=gcr.io/<PROJECT_ID>/ai-assistant
  repository: ai-assistant
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: LoadBalancer
  port: 8080
  targetPort: 8080
  loadBalancerIP: "34.159.47.22"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  # Language and Voice Configuration
  languageCodeDe: "de-DE"
  voiceNameDe: "de-DE-Chirp3-HD-Sulafat"
  languageCodeEn: "en-US"
  voiceNameEn: "en-US-Chirp3-HD-Sulafat"

  # Gemini LLM Model
  geminiModel: "gemini-2.5-flash"
  
  # Server Configuration
  host: "0.0.0.0"
  port: "8080"
  
  # Logging Level
  logLevel: "INFO"
  
  # Data Provider Configuration
  useWeaviate: "true"
  weaviateUrl: "http://weaviate:8080"
  
  # Number of concurrent requests to Google TTS API
  googleTtsApiConcurrency: "5"
  
  # Debug: Record received audio to WAV files
  debugRecordAudio: "false"

  # Firestore database name; use "(default)" unless a named database is configured
  firestoreDatabaseName: "(default)"

# Secrets - these will be created from GitHub Actions
secrets:
  # Gemini API Key
  geminiApiKey: ""
  
  # Admin Secret Key
  adminSecretKey: ""

# Kubernetes Service Account for GKE Workload Identity Federation
# Annotate with the GCP service account that has the required IAM roles.
# Prerequisite: run `gcloud iam service-accounts add-iam-policy-binding` to bind
# the KSA to the GCP SA before deploying.
serviceAccount:
  create: true
  name: "ai-assistant"
  # Workload Identity annotation — required for GCP API access at runtime.
  # Must be set at deploy time:
  #   --set "serviceAccount.annotations.iam\.gke\.io/gcp-service-account=ai-assistant@<PROJECT_ID>.iam.gserviceaccount.com"
  # See docs/helm.md for full WIF setup instructions.
  annotations: {}
