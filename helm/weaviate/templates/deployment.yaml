apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Chart.Name }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: QUERY_DEFAULTS_LIMIT
          value: {{ .Values.env.queryDefaults.limit | quote }}
        - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
          value: {{ .Values.env.authenticationAnonymousAccessEnabled | quote }}
        - name: PERSISTENCE_DATA_PATH
          value: {{ .Values.env.persistenceDataPath | quote }}
        - name: DEFAULT_VECTORIZER_MODULE
          value: {{ .Values.env.defaultVectorizerModule | quote }}
        - name: ENABLE_MODULES
          value: {{ .Values.env.enableModules | quote }}
        - name: CLUSTER_HOSTNAME
          value: {{ .Values.env.clusterHostname | quote }}
        livenessProbe:
          httpGet:
            path: /v1/.well-known/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1/.well-known/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: weaviate-data
          mountPath: {{ .Values.env.persistenceDataPath }}
        {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: weaviate-data
        emptyDir: {}
      {{- end }}
