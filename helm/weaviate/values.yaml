# Default values for weaviate
replicaCount: 1

image:
  repository: semitechnologies/weaviate
  pullPolicy: IfNotPresent
  tag: "1.27.0"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Weaviate configuration
env:
  queryDefaults:
    limit: 25
  authenticationAnonymousAccessEnabled: "true"
  persistenceDataPath: "/var/lib/weaviate"
  defaultVectorizerModule: "none"
  enableModules: ""
  clusterHostname: "node1"

# Persistence - disabled for ephemeral storage
persistence:
  enabled: false
