name: AI Assistant Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'
  pull_request:
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'

permissions:
  id-token: write
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-assistant
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: ai-assistant
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/ai_assistant --cov-report=term-missing
        timeout-minutes: 5

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-assistant/coverage.xml
          retention-days: 7

