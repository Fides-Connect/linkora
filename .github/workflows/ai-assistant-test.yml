name: AI Assistant Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'
      - 'helm/ai-assistant/**'
      - '.github/workflows/cloud-deploy.yml'
  pull_request:
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'
      - 'helm/ai-assistant/**'
      - '.github/workflows/cloud-deploy.yml'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-assistant
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: ai-assistant
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/ai_assistant --cov-report=term-missing
        timeout-minutes: 5

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-assistant/coverage.xml
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    # Only run integration tests if secrets are available (for forks, this will be skipped)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-assistant
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Create test environment file
        working-directory: ai-assistant
        run: |
          cat > .env << EOF
          # Test environment variables
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL=INFO
          HOST=0.0.0.0
          PORT=8080
          EOF

      - name: Start AI Assistant server
        working-directory: ai-assistant
        run: |
          # Start the server in background
          python main.py &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready (max 30 seconds)
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1 || \
               netstat -tuln | grep -q ":8080 "; then
              echo "Server is ready!"
              sleep 2  # Give it a bit more time to fully initialize
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start within 30 seconds"
              exit 1
            fi
            echo "Attempt $i/30..."
            sleep 1
          done

      - name: Run integration test
        working-directory: ai-assistant
        run: |
          # Run the test client with the test audio file
          python tests/test_client.py \
            --server localhost:8080 \
            --audio-file tests/data/ai_assistant_test_input.wav \
            --duration 15
        timeout-minutes: 2

      - name: Verify output file
        working-directory: ai-assistant
        run: |
          # Check if output.wav was created
          if [ -f output.wav ]; then
            echo "✓ Output file created successfully"
            ls -lh output.wav
            
            # Verify it's a valid WAV file using file command
            file output.wav
            
            # Check file size (should be > 0)
            SIZE=$(stat -f%z output.wav 2>/dev/null || stat -c%s output.wav)
            if [ "$SIZE" -gt 1000 ]; then
              echo "✓ Output file has reasonable size: $SIZE bytes"
            else
              echo "✗ Output file is too small: $SIZE bytes"
              exit 1
            fi
          else
            echo "✗ Output file was not created"
            exit 1
          fi

      - name: Check output audio content
        working-directory: ai-assistant
        run: |
          python3 << 'EOF'
          import wave
          import numpy as np
          import sys

          try:
              with wave.open('output.wav', 'rb') as wf:
                  # Read audio data
                  frames = wf.readframes(wf.getnframes())
                  sample_rate = wf.getframerate()
                  sample_width = wf.getsampwidth()
                  duration = wf.getnframes() / sample_rate
                  
                  print(f"Audio file info:")
                  print(f"  Sample rate: {sample_rate} Hz")
                  print(f"  Sample width: {sample_width} bytes")
                  print(f"  Duration: {duration:.2f} seconds")
                  
                  # Convert to numpy array based on 16-bit sample width
                  audio = np.frombuffer(frames, dtype=np.int16)
                  
                  # Calculate RMS (Root Mean Square) amplitude
                  rms = np.sqrt(np.mean(audio.astype(float) ** 2))
                  
                  # Calculate max amplitude
                  max_amplitude = np.max(np.abs(audio))
                  
                  print(f"\nAudio analysis:")
                  print(f"  RMS amplitude: {rms:.2f}")
                  print(f"  Max amplitude: {max_amplitude}")
                  
                  # For 16-bit audio: reasonable speech should have RMS > 100
                  if sample_width == 2:
                      min_rms_threshold = 100
                  
                  if rms < min_rms_threshold:
                      print(f"\n✗ Output file likely contains only silence or noise")
                      print(f"  RMS {rms:.2f} is below threshold {min_rms_threshold}")
                      sys.exit(1)
                  else:
                      print(f"\n✓ Output file contains audio content (speech detected)")
                      print(f"  RMS {rms:.2f} exceeds threshold {min_rms_threshold}")
                      
          except Exception as e:
              print(f"✗ Error analyzing audio file: {e}")
              sys.exit(1)
          EOF

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: |
            ai-assistant/output.wav
          retention-days: 7

      - name: Stop AI Assistant server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            echo "Stopping server (PID: $SERVER_PID)"
            kill $SERVER_PID 2>/dev/null || true
            # Also kill any remaining python processes running main.py
            pkill -f "python main.py" || true
          fi

      - name: Show server logs on failure
        if: failure()
        working-directory: ai-assistant
        run: |
          echo "=== Checking for log files ==="
          ls -la *.log 2>/dev/null || echo "No log files found"
          
          echo "=== Checking running processes ==="
          ps aux | grep python || true
          
          echo "=== Checking port 8080 ==="
          netstat -tuln | grep 8080 || echo "Port 8080 not in use"
