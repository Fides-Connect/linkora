name: AI Assistant Tests

on:
  push:
    branches: [main]
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'
  pull_request:
    paths:
      - 'ai-assistant/**'
      - '.github/workflows/ai-assistant-test.yml'

permissions:
  id-token: write
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ai-assistant
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: ai-assistant
        run: ruff check src/

      - name: Type-check (mypy)
        working-directory: ai-assistant
        run: |
          mypy src/ai_assistant/services/conversation_service.py \
            src/ai_assistant/services/response_orchestrator.py \
            src/ai_assistant/services/agent_tools.py \
            src/ai_assistant/firestore_schemas.py \
            src/ai_assistant/peer_connection_handler.py \
            src/ai_assistant/audio_processor.py \
            src/ai_assistant/signaling_server.py \
            src/ai_assistant/api/v1/endpoints/me.py \
            src/ai_assistant/prompts_templates.py

      - name: Run unit tests
        working-directory: ai-assistant
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/ai_assistant --cov-report=term-missing
        timeout-minutes: 5

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-assistant/coverage.xml
          retention-days: 7

