name: Deploy to Google Cloud

# AI-Assistant deploy: triggered after tests pass on main (see ai-assistant-test.yml).
# Weaviate deploy: triggered directly on push to main when weaviate/** changes.
on:
  workflow_run:
    workflows: ["AI Assistant Integration Test"]
    types: [completed]
    branches: [main, feature/update-cloud-deployment]
  push:
    branches: [main, feature/update-cloud-deployment]
    paths:
      - 'weaviate/**'
      - '.github/workflows/cloud-deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west3
  SERVICE_NAME: ai-assistant-dev
  AR_REPO: ai-assistant-dev  # Artifact Registry repository name

jobs:
  # ── Deploy AI-Assistant to Cloud Run ────────────────────────────────────────
  deploy-ai-assistant:
    name: Deploy AI-Assistant to Cloud Run
    # Run when tests pass (workflow_run), OR on direct push to feature branch for testing.
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/feature/update-cloud-deployment')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use workflow_run SHA when triggered by tests, otherwise use the push SHA.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_CI_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Sync secrets to Secret Manager
        run: |
          sync_secret() {
            local NAME=$1
            local VALUE=$2
            if gcloud secrets describe "$NAME" --project="${{ env.PROJECT_ID }}" &>/dev/null; then
              echo -n "$VALUE" | gcloud secrets versions add "$NAME" --data-file=- --quiet
            else
              echo -n "$VALUE" | gcloud secrets create "$NAME" --data-file=- --quiet
            fi
          }
          sync_secret "gemini-api-key"   "${{ secrets.GEMINI_API_KEY }}"
          sync_secret "admin-secret-key" "${{ secrets.ADMIN_SECRET_KEY }}"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          SHA=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ai-assistant:${SHA}"
          IMAGE_LATEST="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ai-assistant:latest"

          docker build \
            -f ai-assistant/Dockerfile \
            -t "$IMAGE" \
            -t "$IMAGE_LATEST" \
            ai-assistant/

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ secrets.WIF_RT_SERVICE_ACCOUNT }}" \
            --set-env-vars "WEAVIATE_URL=http://${{ secrets.WEAVIATE_VM_IP }}:${{ secrets.WEAVIATE_VM_PORT }},\
              GEMINI_MODEL=gemini-2.5-flash,\
              LANGUAGE_CODE_DE=de-DE,\
              VOICE_NAME_DE=de-DE-Chirp3-HD-Sulafat,\
              LANGUAGE_CODE_EN=en-US,\
              VOICE_NAME_EN=en-US-Chirp3-HD-Sulafat,\
              HOST=0.0.0.0,\
              LOG_LEVEL=INFO,\
              GOOGLE_TTS_API_CONCURRENCY=5,\
              FIRESTORE_DATABASE_NAME=(default),\
              DEBUG_RECORD_AUDIO=false" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,ADMIN_SECRET_KEY=admin-secret-key:latest" \
            --min-instances 1 \
            --max-instances 3 \
            --memory 1Gi \
            --cpu 1 \
            --port 8080 \
            --timeout 3600 \
            --quiet

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "## AI-Assistant Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: $URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ── Deploy Weaviate to Compute Engine VM ────────────────────────────────────
  deploy-weaviate:
    name: Deploy Weaviate to Compute Engine VM
    # Only run when triggered directly by a push (not by workflow_run).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_CI_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Validate required secrets
        run: |
          MISSING=""
          [[ -z "${{ secrets.WEAVIATE_VM_NAME }}" ]] && MISSING="$MISSING WEAVIATE_VM_NAME"
          [[ -z "${{ secrets.WEAVIATE_VM_ZONE }}" ]] && MISSING="$MISSING WEAVIATE_VM_ZONE"
          [[ -z "${{ secrets.WIF_PROVIDER }}" ]]     && MISSING="$MISSING WIF_PROVIDER"
          [[ -z "${{ secrets.WIF_CI_SERVICE_ACCOUNT }}" ]] && MISSING="$MISSING WIF_CI_SERVICE_ACCOUNT"
          if [[ -n "$MISSING" ]]; then
            echo "::error::Missing required GitHub secrets:$MISSING"
            echo "See docs/deployment.md#github-secrets for setup instructions."
            exit 1
          fi

      - name: Copy docker-compose.yml to VM
        run: |
          # scp to home dir (no root permissions needed), then sudo mv into place
          gcloud compute scp weaviate/docker-compose.yml \
            ${{ secrets.WEAVIATE_VM_NAME }}:~/docker-compose.yml \
            --zone=${{ secrets.WEAVIATE_VM_ZONE }} \
            --quiet
          gcloud compute ssh ${{ secrets.WEAVIATE_VM_NAME }} \
            --zone=${{ secrets.WEAVIATE_VM_ZONE }} \
            --quiet \
            --command="sudo mkdir -p /opt/weaviate && sudo mv ~/docker-compose.yml /opt/weaviate/docker-compose.yml"

      - name: Restart Weaviate on VM
        run: |
          gcloud compute ssh ${{ secrets.WEAVIATE_VM_NAME }} \
            --zone=${{ secrets.WEAVIATE_VM_ZONE }} \
            --quiet \
            --command="cd /opt/weaviate && sudo docker compose pull && sudo docker compose up -d"

      - name: Print deployment summary
        run: |
          echo "## Weaviate Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ secrets.WEAVIATE_VM_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Zone**: ${{ secrets.WEAVIATE_VM_ZONE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
