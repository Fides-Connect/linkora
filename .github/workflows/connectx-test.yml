name: Build & Test ConnectX APK in Dev Container

on:
  push:
    branches: [main]
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  pull_request:
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v4

      - &setup_firebase
        name: Setup Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          cd connectx
          chmod +x ./scripts/setup_firebase_for_ci.sh
          ./scripts/setup_firebase_for_ci.sh

      - name: Build APK in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cd ./connectx
            cp ./template.env .env
            dart run build_runner build --delete-conflicting-outputs
            flutter build apk

  test:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - *checkout

      - *setup_firebase

      - name: Run Tests in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cd ./connectx
            cp ./template.env .env
            dart run build_runner build --delete-conflicting-outputs
            flutter test