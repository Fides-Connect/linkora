name: Build & Test ConnectX APK in Dev Container

on:
  push:
    branches: [main]
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  pull_request:
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          cd connectx
          chmod +x ./scripts/setup_firebase_for_ci.sh
          ./scripts/setup_firebase_for_ci.sh
          
      - name: Free Disk Space Before Build
        run: |
          # Remove unnecessary tools to free space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h
          
      - name: Build and Test in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cd ./connectx
            cp ./template.env .env
            
            # Run build_runner
            dart run build_runner build --delete-conflicting-outputs
            
            # Clean up after build_runner
            flutter clean
            rm -rf build/.dart_tool
            
            # Build APK with split-per-abi to reduce size
            flutter build apk --split-per-abi
            
            # Clean up build artifacts before tests
            rm -rf build/app/outputs
            rm -rf build/app/intermediates
            rm -rf ~/.gradle/caches
            flutter clean
            
            # Run tests
            flutter test