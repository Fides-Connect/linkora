name: Build & Test ConnectX APK in Dev Container

on:
  push:
    branches: [main]
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  pull_request:
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          cd connectx
          chmod +x ./scripts/setup_firebase_for_ci.sh
          ./scripts/setup_firebase_for_ci.sh
          
      - name: Build and Test in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cd ./connectx
            cp ./template.env .env
            flutter build apk
            flutter test