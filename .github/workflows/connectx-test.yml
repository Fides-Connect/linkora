name: Build & Test ConnectX APK in Dev Container

on:
  push:
    branches: [main]
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  pull_request:
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Firebase config for CI
        run: |
          cd connectx
          chmod +x ./scripts/setup_firebase_for_ci.sh
          ./scripts/setup_firebase_for_ci.sh
          
      - name: Build and Test in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            cd ./connectx
            cp ./template.env .env
            
            # Install test dependencies
            flutter pub get
            
            # Generate mocks for unit tests
            dart run build_runner build --delete-conflicting-outputs
            
            # Run all tests including new user_service tests
            flutter test
            
            # Build APK
            flutter build apk