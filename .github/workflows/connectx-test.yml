name: Build & Test ConnectX APK in Dev Container

on:
  # Trigger on connectx code changes
  push:
    branches: [main]
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  pull_request:
    paths:
      - 'connectx/**'
      - '.github/workflows/connectx-test.yml'
  
  # Also trigger after devcontainer is built (for .devcontainer changes)
  workflow_run:
    workflows: ["Build and Cache DevContainer"]
    types:
      - completed
  
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild devcontainer without cache'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if workflow_run succeeded or if triggered by push/PR
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Lowercase repository name
        id: repo_name
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js (required for devcontainers/ci)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Firebase config for CI
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          cd connectx
          chmod +x ./scripts/setup_firebase_for_ci.sh
          ./scripts/setup_firebase_for_ci.sh
          
      - name: Free Disk Space Before Build
        run: |
          # Remove unnecessary tools and files to free space
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Remove unnecessary system tools
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          
          # Clean apt cache
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/lib/apt/lists/*
          
          # Clean Docker if present
          docker system prune -af || true
          
          echo "=== Disk space after cleanup ==="
          df -h
          
      - name: Build and Test in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          # For PRs: Builds container inline from PR branch with cache from main as fallback
          # For main: Uses cached image and pushes updates
          # devcontainers/ci automatically builds from checked-out branch context
          cacheFrom: ${{ github.event.inputs.force_rebuild != 'true' && format('ghcr.io/{0}/{1}/devcontainer-cache', steps.repo_name.outputs.owner, steps.repo_name.outputs.name) || '' }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' ? 'always' : 'never' }}
          imageName: ghcr.io/${{ steps.repo_name.outputs.owner }}/${{ steps.repo_name.outputs.name }}/devcontainer-cache
          runCmd: |
            set -e
            cd ./connectx
            cp ./template.env .env
            
            echo "=== Getting Flutter dependencies ==="
            flutter pub get
            
            echo "=== Building APK (ARM64 only to save space) ==="
            # Build only ARM64 for testing (most common) to save space
            flutter build apk --target-platform android-arm64 --release
            
            echo "=== Aggressive cleanup before tests ==="
            # Remove all build outputs except the APK we just built
            rm -rf build/app/intermediates
            rm -rf build/app/.transforms
            rm -rf build/app/tmp
            rm -rf build/kotlin
            rm -rf build/flutter_webrtc
            rm -rf build/firebase_*
            rm -rf build/google_sign_in_android
            rm -rf build/permission_handler_android
            rm -rf build/path_provider_android
            rm -rf build/flutter_local_notifications
            
            # Clean Gradle caches
            rm -rf ~/.gradle/caches
            rm -rf ~/.gradle/wrapper/dists
            rm -rf .gradle
            
            # Clean Flutter caches
            rm -rf ~/.pub-cache/hosted/*/doc
            rm -rf ~/.pub-cache/hosted/*/example
            rm -rf ~/.pub-cache/hosted/*/test
            
            # Clean Flutter build cache
            flutter clean
            
            # Show disk space
            echo "=== Disk space before tests ==="
            df -h
            
            echo "=== Running tests ==="
            # Re-get dependencies after flutter clean
            flutter pub get
            flutter test