name: Deploy AI-Assistant

# Triggered after the AI Assistant Tests workflow passes on main.
on:
  workflow_run:
    workflows: ["AI Assistant Tests"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west3
  SERVICE_NAME: ai-assistant-dev
  AR_REPO: ai-assistant-dev  # Artifact Registry repository name

jobs:
  deploy-ai-assistant:
    name: Deploy AI-Assistant to Cloud Run
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_CI_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Sync secrets to Secret Manager
        run: |
          sync_secret() {
            local NAME=$1
            local VALUE=$2
            if gcloud secrets describe "$NAME" --project="${{ env.PROJECT_ID }}" &>/dev/null; then
              echo -n "$VALUE" | gcloud secrets versions add "$NAME" --data-file=- --quiet
            else
              echo -n "$VALUE" | gcloud secrets create "$NAME" --data-file=- --quiet
            fi
          }
          sync_secret "gemini-api-key"   "${{ secrets.GEMINI_API_KEY }}"
          sync_secret "admin-secret-key" "${{ secrets.ADMIN_SECRET_KEY }}"
          sync_secret "metered-api-key"  "${{ secrets.METERED_API_KEY }}"
          sync_secret "metered-app-name" "${{ secrets.METERED_APP_NAME }}"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ai-assistant:${SHA}"
          IMAGE_LATEST="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/ai-assistant:latest"

          docker build \
            -f ai-assistant/Dockerfile \
            -t "$IMAGE" \
            -t "$IMAGE_LATEST" \
            ai-assistant/

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ secrets.WIF_RT_SERVICE_ACCOUNT }}" \
            --update-env-vars "WEAVIATE_URL=http://${{ secrets.WEAVIATE_VM_IP }}:${{ secrets.WEAVIATE_VM_PORT }}" \
            --update-env-vars "WEAVIATE_SYNC_ON_STARTUP=true" \
            --update-env-vars "GEMINI_MODEL=gemini-2.5-flash" \
            --update-env-vars "LANGUAGE_CODE_DE=de-DE" \
            --update-env-vars "VOICE_NAME_DE=de-DE-Chirp3-HD-Sulafat" \
            --update-env-vars "LANGUAGE_CODE_EN=en-US" \
            --update-env-vars "VOICE_NAME_EN=en-US-Chirp3-HD-Sulafat" \
            --update-env-vars "HOST=0.0.0.0" \
            --update-env-vars "LOG_LEVEL=INFO" \
            --update-env-vars "GOOGLE_TTS_API_CONCURRENCY=5" \
            --update-env-vars "FIRESTORE_DATABASE_NAME=(default)" \
            --update-env-vars "DEBUG_RECORD_AUDIO=false" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,ADMIN_SECRET_KEY=admin-secret-key:latest,METERED_API_KEY=metered-api-key:latest,METERED_APP_NAME=metered-app-name:latest" \
            --vpc-connector "${{ secrets.WEAVIATE_VPC_CONNECTOR }}" \
            --vpc-egress private-ranges-only \
            --min-instances 1 \
            --max-instances 3 \
            --concurrency 10 \
            --memory 1Gi \
            --cpu 1 \
            --port 8080 \
            --timeout 3600 \
            --quiet

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "## AI-Assistant Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: $URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
