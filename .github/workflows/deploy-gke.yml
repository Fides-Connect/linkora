name: Deploy AI Assistant to GKE

on:
  push:
    branches:
      - main
      - feature/update-cloud-deployment
    paths:
      - 'ai-assistant/**'
      - 'helm/ai-assistant/**'
      - '.github/workflows/deploy-gke.yml'

env:
  PROJECT_ID: gen-lang-client-0859968110
  GKE_CLUSTER: fides-production
  GKE_REGION: europe-west3
  IMAGE_NAME: ai-assistant
  NAMESPACE: production

jobs:
  build-and-deploy:
    name: Build and Deploy to GKE
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Install gke-gcloud-auth-plugin & kubectl
      run: |
        gcloud components install gke-gcloud-auth-plugin kubectl --quiet || true
    
    - name: Configure Docker for GCR
      run: |
        gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        IMAGE_TAG="gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        IMAGE_LATEST="gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest"
        
        docker build \
          -f ai-assistant/Dockerfile \
          -t "$IMAGE_TAG" \
          -t "$IMAGE_LATEST" \
          ai-assistant/
        
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "IMAGE_LATEST=$IMAGE_LATEST" >> $GITHUB_ENV

    - name: Debug gcloud auth
      run: |
          gcloud auth list
          gcloud config list --format=json
    
    - name: Push Docker image to GCR
      run: |
        docker push "${{ env.IMAGE_TAG }}"
        docker push "${{ env.IMAGE_LATEST }}"
    
    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
          --region ${{ env.GKE_REGION }} \
          --project ${{ env.PROJECT_ID }}
    
    - name: Install/Upgrade Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Prepare service account for Helm
      run: |
        set -euo pipefail
        printf '%s' "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > /tmp/gcp-sa-key.json
        echo "size: $(wc -c < /tmp/gcp-sa-key.json)"
        echo "sha256: $(sha256sum /tmp/gcp-sa-key.json | cut -d' ' -f1)"
        echo "--- head (visible chars) ---"
        sed -n '1,12p' /tmp/gcp-sa-key.json | sed -n '1,12p' | cat -v
        echo "--- hexdump (first 64 bytes) ---"
        hexdump -C /tmp/gcp-sa-key.json | sed -n '1,4p'
        if jq -e . /tmp/gcp-sa-key.json > /dev/null; then
          echo "JSON valid"
        else
          echo "JSON invalid" >&2
          # optionally upload the file as an artifact for local inspection (use with caution)
          # gh workflow run artifacts or upload-artifact action here if needed
          exit 1
        fi
    
    - name: Deploy Weaviate to GKE
      run: |
        helm upgrade --install weaviate ./helm/weaviate \
          --namespace ${{ env.NAMESPACE }} \
          --create-namespace
    
    - name: Deploy AI Assistant to GKE
      run: |
        helm upgrade --install ai-assistant ./helm/ai-assistant \
          --namespace ${{ env.NAMESPACE }} \
          --create-namespace \
          --set image.tag=${{ github.sha }} \
          --set-file secrets.gcpServiceAccount=/tmp/gcp-sa-key.json \
          --set secrets.geminiApiKey="${{ secrets.GEMINI_API_KEY }}" \
          --set secrets.googleOauthClientId="${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
          --set secrets.adminSecretKey="${{ secrets.ADMIN_SECRET_KEY }}"
        rm -f /tmp/gcp-sa-key.json

    - name: Deployment Summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Deployment successful!**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Project:** ${{ env.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Cluster:** ${{ env.GKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Region:** ${{ env.GKE_REGION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
